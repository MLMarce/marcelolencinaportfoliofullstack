<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#030303"/>
    </linearGradient>
    <linearGradient id="m-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#00b8cc"/>
    </linearGradient>
    <linearGradient id="l-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9d65f5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#7c3aed" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="glow-cyan" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-violet" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="64" height="64" rx="14" ry="14" fill="url(#bg-grad)"/>

  <!-- Border -->
  <rect x="0.5" y="0.5" width="63" height="63" rx="13.5" ry="13.5"
        fill="none" stroke="url(#border-grad)" stroke-width="1.5" opacity="0.7"/>

  <!-- Letter M — cyan -->
  <g filter="url(#glow-cyan)">
    <path d="
      M 9 50
      L 9 14
      L 16 14
      L 23.5 33
      L 31 14
      L 38 14
      L 38 50
      L 32 50
      L 32 26
      L 25 44
      L 22 44
      L 15 26
      L 15 50
      Z
    " fill="url(#m-grad)"/>
  </g>

  <!-- Letter L — violet -->
  <g filter="url(#glow-violet)">
    <path d="
      M 40 14
      L 46 14
      L 46 44
      L 56 44
      L 56 50
      L 40 50
      Z
    " fill="url(#l-grad)"/>
  </g>

  <!-- Accent dots -->
  <circle cx="55" cy="11" r="2.5" fill="#00f0ff" opacity="0.5"/>
  <circle cx="10" cy="54" r="1.8" fill="#7c3aed" opacity="0.45"/>
</svg>
